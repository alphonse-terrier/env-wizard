# Builds env-wizard for macOS (arm64 + x86_64) and Linux (x86_64 musl) on a
# version tag, publishes a GitHub Release with the archives + SHA256SUMS, and
# (optionally) bumps the Homebrew tap formula.
#
# To enable the automatic Homebrew tap bump, add a repository secret named
# HOMEBREW_TAP_TOKEN — a Personal Access Token with `contents:write` on the
# alphonse-terrier/homebrew-env-wizard repo. Without it, the bump job is skipped
# and you update the formula by hand.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          name="env-wizard-${GITHUB_REF_NAME}-${{ matrix.target }}"
          staging="dist/$name"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/env-wizard" "$staging/"
          cp README.md LICENSE "$staging/"
          ( cd dist && tar czf "$name.tar.gz" "$name" )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives and checksums
        shell: bash
        run: |
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS )
          echo "--- SHA256SUMS ---"; cat dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true

  bump-tap:
    name: bump Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: check
        run: echo "present=${{ secrets.HOMEBREW_TAP_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        if: steps.check.outputs.present == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checkout tap
        if: steps.check.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          repository: alphonse-terrier/homebrew-env-wizard
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate formula
        if: steps.check.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          base="https://github.com/alphonse-terrier/env-wizard/releases/download/${GITHUB_REF_NAME}"
          sha() { sha256sum "$(find artifacts -name "*$1*.tar.gz" | head -1)" | cut -d' ' -f1; }
          arm=$(sha "aarch64-apple-darwin")
          intel=$(sha "x86_64-apple-darwin")
          linux=$(sha "x86_64-unknown-linux-musl")
          cat > tap/Formula/env-wizard.rb <<RUBY
          class EnvWizard < Formula
            desc "Interactive .env filler with repo-aware AI hints (cloud or local)"
            homepage "https://github.com/alphonse-terrier/env-wizard"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/env-wizard-v${ver}-aarch64-apple-darwin.tar.gz"
                sha256 "${arm}"
              end
              on_intel do
                url "${base}/env-wizard-v${ver}-x86_64-apple-darwin.tar.gz"
                sha256 "${intel}"
              end
            end

            on_linux do
              on_intel do
                url "${base}/env-wizard-v${ver}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${linux}"
              end
            end

            def install
              bin.install "env-wizard"
            end

            test do
              assert_match "env-wizard #{version}", shell_output("#{bin}/env-wizard --version")
            end
          end
          RUBY

      - name: Commit and push
        if: steps.check.outputs.present == 'true'
        shell: bash
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/env-wizard.rb
          git commit -m "env-wizard ${GITHUB_REF_NAME}" || { echo "no changes"; exit 0; }
          git push
